<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGÍSTICA 8 - CONTROL OPERATIVO FINAL</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #0a192f;
            --secondary: #172a45;
            --accent: #304ffe;
            --success: #00c853;
            --danger: #ff1744;
            --bg: #e9ecef;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }

        header {
            background: var(--primary);
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--accent);
        }

        .logo-area { display: flex; align-items: center; gap: 12px; font-weight: bold; font-size: 1.2rem; }
        #clock { font-family: monospace; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 4px; }

        main { padding: 20px; overflow-y: auto; flex-grow: 1; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .stat-card h3 { margin: 0; font-size: 0.8rem; color: #666; text-transform: uppercase; }
        .stat-card .num { font-size: 1.8rem; font-weight: bold; margin-top: 5px; }

        .search-bar {
            background: white; padding: 15px; border-radius: 8px; margin-bottom: 15px;
            display: flex; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .search-bar input { flex-grow: 1; padding: 10px; border: 1px solid #ddd; border-radius: 5px; outline: none; }

        .table-container { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #f1f3f9; padding: 15px; font-size: 0.8rem; color: #333; text-transform: uppercase; text-align: left; }
        td { padding: 12px 15px; border-bottom: 1px solid #eee; font-size: 0.9rem; vertical-align: middle; }
        
        .btn-cmd {
            padding: 8px 12px;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            font-size: 0.75rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
            min-width: 150px;
            justify-content: center;
        }

        .btn-servicio { background: #e8f5e9; color: #2e7d32; border: 1px solid #2e7d32; }
        .btn-fuera { background: #ffebee; color: #c62828; border: 1px solid #c62828; }

        .btn-km {
            background: var(--accent);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.75rem;
            width: 100%;
            margin-top: 5px;
        }

        .km-val { font-weight: bold; font-family: monospace; font-size: 1.1rem; color: #222; }
        code { background: #f4f4f4; padding: 3px 6px; border-radius: 4px; font-weight: bold; color: #d63384; }
    </style>
</head>
<body>

<header>
    <div class="logo-area"><i class="fas fa-shuttle-van"></i> LOGÍSTICA 8 | GESTIÓN OPERATIVA</div>
    <div id="clock">--:--:--</div>
</header>

<main>
    <div class="stats-grid">
        <div class="stat-card" style="border-top: 4px solid var(--accent);"><h3>Total Móviles</h3><div class="num" id="st-total">56</div></div>
        <div class="stat-card" style="border-top: 4px solid var(--success);"><h3>En Servicio</h3><div class="num" id="st-on" style="color: var(--success)">0</div></div>
        <div class="stat-card" style="border-top: 4px solid var(--danger);"><h3>Fuera de Servicio</h3><div class="num" id="st-off" style="color: var(--danger)">0</div></div>
    </div>

    <div class="search-bar">
        <input type="text" id="mainSearch" onkeyup="render()" placeholder="Filtrar por ID, Patente o Destino...">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Móvil</th>
                    <th>Vehículo</th>
                    <th>Patente</th>
                    <th style="width: 180px;">Kilometraje</th>
                    <th>Comando de Estado</th>
                    <th>Destino</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</main>

    function render() {
        const query = document.getElementById('mainSearch').value.toLowerCase();
        const tbody = document.getElementById('tbody');
        
        const filtrados = flota.filter(v => 
            v.id.toLowerCase().includes(query) || 
            v.p.toLowerCase().includes(query) ||
            v.z.toLowerCase().includes(query)
        );

        tbody.innerHTML = filtrados.map(v => `
            <tr>
                <td><strong>${v.id}</strong></td>
                <td><div style="font-weight:600">${v.m}</div></td>
                <td><code>${v.p}</code></td>
                <td>
                    <div class="km-val">${v.km.toLocaleString()} KM</div>
                    <button class="btn-km" onclick="updateKM('${v.id}')">
                        <i class="fas fa-edit"></i> ACTUALIZAR KILOMETRAJE
                    </button>
                </td>
                <td>
                    <button class="btn-cmd ${v.activo ? 'btn-servicio' : 'btn-fuera'}" onclick="toggle('${v.id}')">
                        <i class="fas ${v.activo ? 'fa-check-circle' : 'fa-times-circle'}"></i>
                        ${v.activo ? 'EN SERVICIO' : 'FUERA DE SERVICIO'}
                    </button>
                </td>
                <td><i class="fas fa-map-marker-alt" style="color:var(--accent)"></i> ${v.z}</td>
            </tr>
        `).join('');

        document.getElementById('st-on').innerText = flota.filter(x => x.activo).length;
        document.getElementById('st-off').innerText = flota.filter(x => !x.activo).length;
    }

    function updateKM(id) {
        const item = flota.find(x => x.id === id);
        const nuevoKM = prompt(`Ingresar Kilometraje para Móvil ${id}:`, item.km);
        if(nuevoKM !== null && !isNaN(nuevoKM) && nuevoKM !== "") {
            item.km = parseInt(nuevoKM);
            render();
        }
    }

    function toggle(id) {
        const item = flota.find(x => x.id === id);
        item.activo = !item.activo;
        render();
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    window.onload = render;
