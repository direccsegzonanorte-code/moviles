<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA LOGÍSTICA 8 - CONTROL DE FLOTA</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --primary: #0a192f;
            --secondary: #172a45;
            --accent: #304ffe;
            --success: #00c853;
            --danger: #ff1744;
            --bg: #e9ecef;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg); margin: 0; display: flex; flex-direction: column; height: 100vh; }

        header {
            background: var(--primary);
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 4px solid var(--accent);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .logo-area { display: flex; align-items: center; gap: 12px; font-weight: bold; font-size: 1.2rem; }
        #clock { font-family: monospace; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 4px; }

        main { padding: 25px; overflow-y: auto; flex-grow: 1; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 20px; margin-bottom: 25px; }
        .stat-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 6px solid var(--accent); }
        .stat-card h3 { margin: 0; font-size: 0.8rem; color: #666; text-transform: uppercase; letter-spacing: 1px; }
        .stat-card .num { font-size: 2rem; font-weight: bold; margin-top: 8px; color: var(--primary); }

        .search-bar {
            background: white; padding: 20px; border-radius: 12px; margin-bottom: 20px;
            display: flex; gap: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .search-bar input { flex-grow: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; outline: none; }
        .search-bar input:focus { border-color: var(--accent); }

        .table-container { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.08); }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { background: #f1f3f9; padding: 18px; font-size: 0.85rem; color: var(--primary); text-transform: uppercase; }
        td { padding: 15px 18px; border-bottom: 1px solid #f0f0f0; font-size: 0.95rem; }
        tr:hover { background: #f8faff; }

        .status-pill { 
            padding: 8px 14px; border-radius: 25px; font-size: 0.75rem; font-weight: bold; 
            cursor: pointer; display: inline-flex; align-items: center; gap: 8px; border: 1px solid transparent;
        }
        .en-servicio { background: #e8f5e9; color: #2e7d32; border-color: #c8e6c9; }
        .fuera-servicio { background: #ffebee; color: #c62828; border-color: #ffcdd2; }

        .btn-update-km {
            background: var(--accent); color: white; border: none; padding: 6px 12px;
            border-radius: 6px; cursor: pointer; font-size: 0.75rem; font-weight: 600;
            display: flex; align-items: center; gap: 5px; transition: 0.2s;
        }
        .btn-update-km:hover { background: #1a237e; }
        
        .km-display { font-family: 'Courier New', Courier, monospace; font-weight: bold; color: #444; font-size: 1.1rem; }
        code { background: #eee; padding: 3px 6px; border-radius: 4px; font-weight: bold; color: #d63384; }
    </style>
</head>
<body>

<header>
    <div class="logo-area"><i class="fas fa-shield-alt"></i> SISTEMA LOGÍSTICA 8 | 56 UNIDADES</div>
    <div id="clock">00:00:00</div>
</header>

<main>
    <div class="stats-grid">
        <div class="stat-card"><h3>Flota Total</h3><div class="num" id="st-total">56</div></div>
        <div class="stat-card" style="border-left-color: var(--success)"><h3>En Servicio</h3><div class="num" id="st-on" style="color: var(--success)">0</div></div>
        <div class="stat-card" style="border-left-color: var(--danger)"><h3>Fuera de Servicio</h3><div class="num" id="st-off" style="color: var(--danger)">0</div></div>
    </div>

    <div class="search-bar">
        <input type="text" id="mainSearch" onkeyup="render()" placeholder="Filtrar por ID de móvil, patente o destino (Ej: 11207, CAP 14)...">
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>Móvil</th>
                    <th>Vehículo / Tipo</th>
                    <th>Patente</th>
                    <th>Kilometraje</th>
                    <th>Estado de Unidad</th>
                    <th>Destino Asignado</th>
                </tr>
            </thead>
            <tbody id="tbody"></tbody>
        </table>
    </div>
</main>

<script>
    // LISTADO EXACTO DE 56 MÓVILES SUMINISTRADO
    const ids = [
        "8472", "7589", "10746", "D54", "D65", "11207", "8343", "10368", "10268", "10272",
        "9588", "9577", "9639", "9413", "9370", "9233", "9634", "10216", "10586", "10650",
        "11213", "11220", "11311", "11302", "11209", "11184", "11217", "11204", "11140",
        "10267", "10328", "8608", "9579", "9894", "9895", "10008", "10023", "10038",
        "10457", "10790", "9403", "9387", "11303", "11444", "11270", "11188", "11317", "9626",
        "A2465", "A2544", "A2613", "A2623", "A2624", "A2647", "A2652", "A2662"
    ];

    // Inicialización de datos
    const flota = ids.map(id => {
        let motor = "NISSAN FRONTIER";
        let cat = "PICK-UP";
        let destino = "DIVISION CAP 14";

        if(id.startsWith("A")) { motor = "KAWASAKI XLX300"; cat = "MOTO"; }
        else if(id.startsWith("D")) { motor = (id === "D54" ? "CARRO" : "PLANCHA"); cat = "ESPECIAL"; destino = "ZONA 8"; }
        else if(["7589","10368","10268","10272","9588","9577","10267","10328","8608","9579","9894","9895","10008","10023","10038"].includes(id)) {
            motor = "FIAT CRONOS"; cat = "SEDAN";
        }
        if(id > "11000" && !id.startsWith("A")) destino = "DIVISION CAP 15";
        
        return { id, motor, cat, patente: "P-" + id, km: 0, activo: true, destino };
    });

    function render() {
        const query = document.getElementById('mainSearch').value.toLowerCase();
        const tbody = document.getElementById('tbody');
        
        const filtrados = flota.filter(v => 
            v.id.toLowerCase().includes(query) || 
            v.destino.toLowerCase().includes(query) ||
            v.patente.toLowerCase().includes(query)
        );

        tbody.innerHTML = filtrados.map(v => `
            <tr>
                <td><strong>${v.id}</strong></td>
                <td>
                    <div style="font-weight:600">${v.motor}</div>
                    <div style="font-size:0.7rem; color:#8892b0">${v.cat}</div>
                </td>
                <td><code>${v.patente}</code></td>
                <td>
                    <div class="km-display">${v.km.toLocaleString()} KM</div>
                    <button class="btn-update-km" onclick="updateKM('${v.id}')">
                        <i class="fas fa-tachometer-alt"></i> ACTUALIZAR KM
                    </button>
                </td>
                <td>
                    <span class="status-pill ${v.activo ? 'en-servicio' : 'fuera-servicio'}" onclick="toggleStatus('${v.id}')">
                        <i class="fas ${v.activo ? 'fa-check-circle' : 'fa-exclamation-triangle'}"></i>
                        ${v.activo ? 'EN SERVICIO' : 'FUERA DE SERVICIO'}
                    </span>
                </td>
                <td><i class="fas fa-map-marker-alt" style="color:var(--accent)"></i> ${v.destino}</td>
            </tr>
        `).join('');

        // Actualizar contadores
        document.getElementById('st-on').innerText = flota.filter(x => x.activo).length;
        document.getElementById('st-off').innerText = flota.filter(x => !x.activo).length;
    }

    function updateKM(id) {
        const item = flota.find(x => x.id === id);
        const nuevoKM = prompt(`Ingrese el Kilometraje actual para el móvil ${id}:`, item.km);
        if(nuevoKM !== null && !isNaN(nuevoKM) && nuevoKM !== "") {
            item.km = parseInt(nuevoKM);
            render();
        }
    }

    function toggleStatus(id) {
        const item = flota.find(x => x.id === id);
        item.activo = !item.activo;
        render();
    }

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    window.onload = render;
</script>

</body>
</html>
